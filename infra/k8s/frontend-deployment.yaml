apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpulse-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: productpulse-frontend
  template:
    metadata:
      labels:
        app: productpulse-frontend
    spec:
      containers:
        - name: frontend
          image: productpulse/frontend:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: productpulse-frontend
spec:
  selector:
    app: productpulse-frontend
  ports:
    - port: 3000
      targetPort: 3000
