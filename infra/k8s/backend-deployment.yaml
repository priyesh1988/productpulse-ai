apiVersion: apps/v1
kind: Deployment
metadata:
  name: productpulse-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: productpulse-backend
  template:
    metadata:
      labels:
        app: productpulse-backend
    spec:
      containers:
        - name: backend
          image: productpulse/backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: productpulse-config
            - secretRef:
                name: productpulse-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: productpulse-backend
spec:
  selector:
    app: productpulse-backend
  ports:
    - port: 8000
      targetPort: 8000
